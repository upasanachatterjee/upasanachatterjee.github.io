<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description | strip_newlines | strip }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script src="https://kit.fontawesome.com/db3565d2a5.js" crossorigin="anonymous"></script>
  <script>
    // Apply saved theme before first paint to avoid a flash.
    (function () {
      var saved = localStorage.getItem("theme");
      if (saved === "light" || saved === "dark") {
        document.documentElement.setAttribute("data-theme", saved);
      }
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <nav class="site-nav">
      <a class="site-name" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <div class="nav-links">
        <a href="#publications">Publications</a>
        <a href="{{ '/assets/cv.pdf' | relative_url }}">CV</a>
        <button id="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
          <span class="toggle-icon" aria-hidden="true"></span>
        </button>
      </div>
    </nav>
  </header>

  <main class="content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p class="footnote">&copy; {{ site.time | date: "%Y" }} {{ site.author }} · Built with Jekyll, hosted on GitHub Pages.</p>
    <p class="footnote">Last updated: {{ site.time | date: "%B %-d, %Y" }}</p>
  </footer>

  <script>
    (function () {
      var toggle = document.getElementById("theme-toggle");
      toggle.addEventListener("click", function () {
        var root = document.documentElement;
        var current = root.getAttribute("data-theme");
        if (!current) {
          current = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        var next = current === "dark" ? "light" : "dark";
        root.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
      });
    })();
  </script>
</body>
</html>
